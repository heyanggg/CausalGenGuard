dataset: toy
source_context: winter
target_context: spring
smoke_max_sequences: 4
paths:
  source_train_jsonl: outputs/processed/toy_sequences.jsonl
  source_val_jsonl: outputs/processed/toy_sequences.jsonl
  target_normal_test_jsonl: outputs/processed/toy_sequences.jsonl
  synthetic_target_jsonl: outputs/processed/toy_sequences.jsonl
  output_dir: outputs/results/context_shift_toy
model:
  backbone:
    embedding_dim: 32
    layers: 1
    mask_ratio: 0.2
    mask_step: 4
    epochs: 1
    batch_size: 2
  causal:
    tau: 2
    hidden_dim: 32
    threshold_h: 0.0
    epochs: 1
    batch_size: 2
    causality_samples: 2
fusion:
  alpha: 0.6
  beta: 0.4
  threshold_quantile: 0.95
experiments:
  use_smartgen: true
  use_causal: true
  use_causal_tof: true
