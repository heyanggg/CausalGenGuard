dataset: us
source_context: single
target_context: multiple
paths:
  source_train_jsonl: outputs/processed/us_sequences.jsonl
  source_val_jsonl: outputs/processed/us_sequences.jsonl
  target_normal_test_jsonl: outputs/synthetic/us_NT.jsonl
  synthetic_target_jsonl: outputs/synthetic/us_NT.jsonl
  output_dir: outputs/results/context_shift_us
model:
  backbone:
    embedding_dim: 64
    layers: 1
    mask_ratio: 0.2
    mask_step: 4
  causal:
    tau: 4
    hidden_dim: 64
    threshold_h: 0.0
fusion:
  alpha: 0.6
  beta: 0.4
  threshold_quantile: 0.95
experiments:
  use_smartgen: true
  use_causal: true
  use_causal_tof: true
